# Nginx reverse proxy for the KOS WL Bot dashboard.
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Obtain TLS certs with: certbot --nginx -d dashboard.example.com

server {
    listen 80;
    server_name dashboard.example.com;

    # Redirect all HTTP to HTTPS (enabled automatically by certbot).
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dashboard.example.com;

    # Managed by certbot:
    # ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# NOTE: never expose the bot's internal control API (port 4000) to the public.
# It is bound to 127.0.0.1 and reached by the dashboard locally only.
